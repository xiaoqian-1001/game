<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>女巫的毒药</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: #121224;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 0;
            margin: 0;
        }
        .game-wrap {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #c92a2a;
            margin-bottom: 8px;
            font-size: 28px;
            letter-spacing: 2px;
        }
        .rule-desc {
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
        }
        /* 模式选择 */
        .mode-panel {
            margin-bottom: 15px;
            padding: 12px;
            background: #1e1e38;
            border-radius: 10px;
        }
        .mode-btn {
            padding: 8px 14px;
            margin: 0 5px;
            border: none;
            border-radius: 6px;
            background: #272750;
            color: #fff;
            cursor: pointer;
            font-size: 15px;
        }
        .mode-btn.active {
            background: #c92a2a;
        }
        /* 联机面板 */
        .online-panel {
            margin-bottom: 15px;
            padding: 12px;
            background: #1e1e38;
            border-radius: 10px;
        }
        .online-panel input {
            padding: 8px;
            width: 140px;
            margin: 0 5px;
            border: none;
            border-radius: 6px;
            background: #272750;
            color: #fff;
            font-size: 16px;
        }
        .online-btn {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            background: #c92a2a;
            color: #fff;
            cursor: pointer;
            margin: 0 3px;
            font-size: 15px;
        }
        .online-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .online-status {
            margin-top: 10px;
            font-size: 15px;
            color: #888;
        }
        .diff-buttons {
            margin-bottom: 20px;
        }
        .diff-btn {
            padding: 10px 20px;
            margin: 0 6px;
            border: none;
            border-radius: 8px;
            background: #272750;
            color: #fff;
            cursor: pointer;
            border: 2px solid #3a3a70;
            font-size: 16px;
        }
        .diff-btn:hover {
            background: #3a3a70;
        }
        .turn-hint {
            font-size: 22px;
            margin: 15px 0;
            padding: 10px 24px;
            border-radius: 8px;
            display: inline-block;
            transition: 0.3s;
            font-weight: bold;
        }
        .turn-p1 {
            background: #3c1a1a;
            color: #ff8787;
            border: 2px solid #c92a2a;
        }
        .turn-p2 {
            background: #1a3c2a;
            color: #87ffb8;
            border: 2px solid #2b8a3e;
        }
        .turn-end {
            background: #3c3c1a;
            color: #ffd700;
            border: 2px solid #ffd700;
        }
        .turn-default {
            background: #272750;
            color: #ffffff;
            border: 2px solid #3a3a70;
        }
        .grid-board {
            display: grid;
            gap: 12px;
            margin: 0 auto 30px;
            justify-content: center;
        }
        .grid-9 { grid-template-columns: repeat(3, 90px); grid-template-rows: repeat(3, 90px); }
        .grid-16 { grid-template-columns: repeat(4, 75px); grid-template-rows: repeat(4, 75px); }
        .grid-25 { grid-template-columns: repeat(5, 65px); grid-template-rows: repeat(5, 65px); }
        @media (max-width: 450px) {
            .grid-board { gap: 8px; }
            .grid-9 { grid-template-columns: repeat(3, 70px); grid-template-rows: repeat(3, 70px); }
            .grid-16 { grid-template-columns: repeat(4, 60px); grid-template-rows: repeat(4, 60px); }
            .grid-25 { grid-template-columns: repeat(5, 50px); grid-template-rows: repeat(5, 50px); }
        }
        .cell {
            background: #272750;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid #3a3a70;
        }
        .cell:hover:not(.eaten) { background: #3a3a70; transform: scale(1.05); }
        .cell:active:not(.eaten) { transform: scale(0.95); }
        .cell.eaten { background: #000; border-color: #111; cursor: not-allowed; transform: none; }
        /* 自己的毒药全程可见 */
        .cell.my-poison-p1 { background: #c92a2a !important; border-color: #ff8787 !important; }
        .cell.my-poison-p2 { background: #2b8a3e !important; border-color: #87ffb8 !important; }
        /* 对方毒药游戏结束才显示 */
        .cell.oppo-poison-p1 { background: #c92a2a !important; border-color: #ff8787 !important; animation: poisonBlink 0.8s infinite alternate; }
        .cell.oppo-poison-p2 { background: #2b8a3e !important; border-color: #87ffb8 !important; animation: poisonBlink 0.8s infinite alternate; }
        @keyframes poisonBlink { from { opacity: 0.8; } to { opacity: 1; } }

        /* ========== 胜负动画 ========== */
        @keyframes failShake {
            0%,100% { transform: translateX(0); }
            10%,30%,50%,70%,90% { transform: translateX(-8px); }
            20%,40%,60%,80% { transform: translateX(8px); }
        }
        @keyframes failFlash {
            0%,100% { opacity:1; }
            50% { opacity:0.3; }
        }
        .fail-animate {
            animation: failShake 0.6s ease, failFlash 0.6s ease 3;
        }
        @keyframes winPulse {
            0%,100% { transform: scale(1); box-shadow: 0 0 0 rgba(255,215,0,0); }
            50% { transform: scale(1.08); box-shadow: 0 0 20px rgba(255,215,0,0.8); }
        }
        .win-animate {
            animation: winPulse 0.8s ease infinite alternate;
        }

        .mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center;
            z-index: 999; color: #fff; font-size: 24px; text-align: center; padding: 20px;
        }
        #restart-btn {
            padding: 12px 35px; border: none; border-radius: 10px;
            background: #272750; color: #fff; font-size: 18px; cursor: pointer;
            transition: 0.2s; border: 2px solid #3a3a70;
        }
        #restart-btn:hover { background: #3a3a70; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
<div class="game-wrap">
    <h1>女巫的毒药</h1>
    <div class="rule-desc">双人暗选毒药 · 允许同格毒药 · 吃到对方毒药即败</div>

    <div class="mode-panel">
        <button class="mode-btn active" onclick="setMode('online')">联机对战</button>
        <button class="mode-btn" onclick="setMode('ai')">人机AI对战</button>
    </div>

    <div class="online-panel" id="onlinePanel">
        <input type="text" id="roomId" placeholder="输入房间号">
        <button class="online-btn" onclick="createRoom()">创建房间</button>
        <button class="online-btn" onclick="joinRoom()">加入房间</button>
        <button class="online-btn" onclick="disconnectRoom()">断开</button>
        <div class="online-status" id="onlineStatus">未连接</div>
    </div>

    <div class="diff-buttons">
        <button class="diff-btn" onclick="setDiff(9)">9宫格</button>
        <button class="diff-btn" onclick="setDiff(16)">16宫格</button>
        <button class="diff-btn" onclick="setDiff(25)">25宫格</button>
    </div>
    
    <div class="turn-hint turn-default" id="turnHint">请先选择宫格或联机</div>
    <div class="grid-board" id="gridBox"></div>
    <button id="restart-btn" onclick="confirmReset()">重新开始</button>
</div>
<div class="mask" id="mask" style="display: none;"></div>

<script>
let peer, conn;
let isOnline = false;
let myPlayer = 0;
// 严格隔离模式：online/ai 完全独立，绝不串台
let gameMode = "online";

let totalCells = 9;
let poison1 = -1;
let poison2 = -1;
let eatenList = [];
let nowPlayer = 1;
let gameStage = "select";
let allCells = [];

// ========== 模式切换：彻底隔离联机/人机，绝不串台 ==========
function setMode(mode){
    gameMode = mode;
    // 按钮高亮
    document.querySelectorAll(".mode-btn").forEach(btn=>btn.classList.remove("active"));
    event.target.classList.add("active");
    // 联机面板只在联机模式显示
    document.getElementById("onlinePanel").style.display = mode==="online" ? "block" : "none";
    // 重置所有状态，彻底清干净
    resetGame();
    isOnline = false;
    myPlayer = 0;
    // 人机模式固定身份
    if(mode==="ai"){
        myPlayer = 1;
    }
}

function createRoom() {
    const roomId = document.getElementById("roomId").value || Math.random().toString(36).slice(2,8);
    peer = new Peer(roomId);
    myPlayer = 1;
    peer.on('open', () => document.getElementById("onlineStatus").innerText = `✅ 房间：${roomId}，等待对手加入`);
    peer.on('connection', (c) => {
        conn = c; isOnline = true;
        document.getElementById("onlineStatus").innerText = "✅ 对手已加入，你是【玩家1】";
        bindConn();
    });
}
function joinRoom() {
    const roomId = document.getElementById("roomId").value;
    if (!roomId) return alert("请输入房间号");
    peer = new Peer(); myPlayer = 2;
    peer.on('open', () => {
        conn = peer.connect(roomId);
        document.getElementById("onlineStatus").innerText = "正在连接房间...";
        conn.on('open', () => {
            isOnline = true;
            document.getElementById("onlineStatus").innerText = "✅ 加入成功，你是【玩家2】";
            bindConn();
        });
    });
}
function disconnectRoom() {
    if(conn) conn.close(); if(peer) peer.destroy();
    isOnline = false; myPlayer = 0;
    document.getElementById("onlineStatus").innerText = "已断开连接";
}
function bindConn() {
    conn.on('data', (data) => {
        switch(data.type){
            case "diff": totalCells=data.val; resetGame(); break;
            case "pick1": poison1=data.val; gameStage="pick2"; updateUI();
                if(myPlayer===2){showMask("✅ 玩家1已选毒，请你选择毒药");setTimeout(()=>hideMask(),2000);} break;
            case "pick2": poison2=data.val; gameStage="battle"; updateUI();
                showMask("✅ 双方选毒完毕，游戏开始");setTimeout(()=>hideMask(),2000); break;
            case "eat":
                eatenList=data.eaten; nowPlayer=data.player; gameStage=data.stage;
                updateUI();
                if(data.stage==="end"){
                    document.getElementById("turnHint").innerText=data.msg;
                    document.getElementById("turnHint").className="turn-hint turn-end";
                    lockAllCell();
                    if(data.winPlayer===1) triggerWinAnim(1);
                    if(data.winPlayer===2) triggerWinAnim(2);
                }
                break;
        }
    });
    conn.on('close', ()=>{isOnline=false;myPlayer=0;document.getElementById("onlineStatus").innerText="❌ 对手断开";});
}
function sendData(type,val,winPlayer=null){
    if(!isOnline||!conn)return;
    conn.send({type,val,eaten:eatenList,player:nowPlayer,stage:gameStage,msg:document.getElementById("turnHint").innerText,winPlayer});
}
function setDiff(num){totalCells=num;resetGame();gameStage="pick1";updateUI();sendData("diff",num);}
function initGrid(){
    const box=document.getElementById("gridBox");box.innerHTML="";allCells=[];
    box.className="grid-board";
    if(totalCells===9)box.classList.add("grid-9");
    if(totalCells===16)box.classList.add("grid-16");
    if(totalCells===25)box.classList.add("grid-25");
    for(let i=0;i<totalCells;i++){
        const cell=document.createElement("div");cell.className="cell";cell.dataset.id=i;
        cell.onclick=()=>clickCell(i);box.appendChild(cell);allCells.push(cell);
    }
}
function showMask(t){document.getElementById("mask").innerText=t;document.getElementById("mask").style.display="flex";}
function hideMask(){document.getElementById("mask").style.display="none";}

// 平局判定
function checkTieGame(){
    if(eatenList.length >= totalCells){
        gameStage = "end";
        document.getElementById("turnHint").innerText = "⚪ 全部格子吃完，平局！";
        document.getElementById("turnHint").className = "turn-hint turn-end";
        lockAllCell();
        sendData("eat",null);
        return true;
    }
    return false;
}

// ========== 核心修复1：AI瞬间反应 0延迟 ==========
function aiPlay(){
    // 严格限定：仅人机模式+对战阶段+AI回合才执行
    if(gameMode !== "ai" || gameStage !== "battle" || nowPlayer !== 2) return;
    // 无任何延迟，瞬间执行
    // 筛选安全格子：不吃自己毒药、不吃玩家毒药、没被吃掉
    let available = [];
    for(let i=0;i<totalCells;i++){
        if(!eatenList.includes(i) && i !== poison2 && i !== poison1){
            available.push(i);
        }
    }
    // 随机选一个安全格，瞬间点击
    let pick = available[Math.floor(Math.random() * available.length)];
    clickCell(pick);
}

// ========== 胜负动画 ==========
function triggerFailAnim(){
    document.getElementById("gridBox").classList.add("fail-animate");
    setTimeout(()=>document.getElementById("gridBox").classList.remove("fail-animate"),600);
}
function triggerWinAnim(winner){
    let target = winner===1 ? poison1 : poison2;
    allCells[target].classList.add("win-animate");
}

function clickCell(id){
    if(eatenList.includes(id)||gameStage==="end")return;

    // ========== 联机模式权限 ==========
    if(gameMode === "online"){
        // 没联机直接禁止操作
        if(!isOnline) return;
        if(gameStage==="pick1"&&myPlayer!==1)return;
        if(gameStage==="pick2"&&myPlayer!==2)return;
        if(gameStage==="battle"&&myPlayer!==nowPlayer)return;
    }

    // ========== 人机模式权限 ==========
    if(gameMode === "ai"){
        // 玩家只能在自己回合操作
        if(gameStage==="battle" && nowPlayer!==1) return;
    }

    // ========== 选毒阶段 ==========
    if(gameStage==="pick1"){
        poison1 = id;
        gameStage = "pick2";
        updateUI();
        sendData("pick1", id);
        // 人机模式：AI瞬间选毒，无延迟
        if(gameMode === "ai"){
            poison2 = Math.floor(Math.random() * totalCells);
            gameStage = "battle";
            updateUI();
            showMask("✅ 双方选毒完毕，游戏开始");
            setTimeout(()=>hideMask(),1500);
        }else{
            showMask("你已选毒，等待玩家2");
            setTimeout(()=>hideMask(),2000);
        }
        return;
    }

    if(gameMode === "online" && gameStage==="pick2"){
        poison2 = id;
        gameStage = "battle";
        updateUI();
        sendData("pick2", id);
        return;
    }

    // ========== 对战阶段 ==========
    eatenList.push(id);
    if(checkTieGame()) return;

    // ========== 核心修复2：胜负判定严格区分模式，绝不串台 ==========
    // 【联机模式】胜负
    if(gameMode === "online"){
        if(nowPlayer===1 && id === poison2){
            gameStage="end";
            document.getElementById("turnHint").innerText="💀 玩家1中招！玩家2获胜！";
            document.getElementById("turnHint").className="turn-hint turn-end";
            triggerFailAnim();
            triggerWinAnim(2);
            lockAllCell();
            sendData("eat",null,2);
            return;
        }
        if(nowPlayer===2 && id === poison1){
            gameStage="end";
            document.getElementById("turnHint").innerText="💀 玩家2中招！玩家1获胜！";
            document.getElementById("turnHint").className="turn-hint turn-end";
            triggerWinAnim(1);
            lockAllCell();
            sendData("eat",null,1);
            return;
        }
    }

    // 【人机模式】胜负（和联机完全隔离，单独判定）
    if(gameMode === "ai"){
        if(nowPlayer===1 && id === poison2){
            // 玩家吃到AI毒药 → 玩家输 AI赢
            gameStage="end";
            document.getElementById("turnHint").innerText="💀 你中招！AI获胜！";
            document.getElementById("turnHint").className="turn-hint turn-end";
            triggerFailAnim();
            triggerWinAnim(2);
            lockAllCell();
            return;
        }
        if(nowPlayer===2 && id === poison1){
            // AI吃到玩家毒药 → AI输 玩家赢
            gameStage="end";
            document.getElementById("turnHint").innerText="🎉 AI中招！你获胜！";
            document.getElementById("turnHint").className="turn-hint turn-end";
            triggerWinAnim(1);
            lockAllCell();
            return;
        }
    }

    // 切换回合
    nowPlayer = nowPlayer===1?2:1;
    updateUI();
    sendData("eat",null);
    // 人机模式：瞬间触发AI行动
    if(gameMode === "ai") aiPlay();
}

function updateUI(){
    const hint=document.getElementById("turnHint");
    if(gameStage==="select"){hint.innerText="请先选择宫格或联机";hint.className="turn-hint turn-default";}
    else if(gameStage==="pick1"){hint.innerText="玩家1：请选择毒药";hint.className="turn-hint turn-p1";}
    else if(gameStage==="pick2"){hint.innerText="玩家2：请选择毒药";hint.className="turn-hint turn-p2";}
    else if(gameStage==="battle"){
        if(gameMode==="ai"){
            hint.innerText = nowPlayer===1 ? "你的回合，请点击格子" : "AI思考中...";
        }else{
            hint.innerText=`玩家${nowPlayer} 回合，请点击格子`;
        }
        hint.className=nowPlayer===1?"turn-hint turn-p1":"turn-hint turn-p2";
    }

    allCells.forEach((cell,idx)=>{
        cell.classList.remove("eaten","my-poison-p1","my-poison-p2","oppo-poison-p1","oppo-poison-p2","win-animate","fail-animate");
        if(eatenList.includes(idx))cell.classList.add("eaten");

        // 自己毒药全程高亮
        if(myPlayer===1 && idx===poison1) cell.classList.add("my-poison-p1");
        if(myPlayer===2 && idx===poison2) cell.classList.add("my-poison-p2");
        // 人机模式：玩家只看自己毒药
        if(gameMode==="ai" && idx===poison1) cell.classList.add("my-poison-p1");

        // 游戏结束揭晓
        if(gameStage==="end"){
            if(idx===poison1) cell.classList.add("oppo-poison-p1");
            if(idx===poison2) cell.classList.add("oppo-poison-p2");
        }
    });
}
function lockAllCell(){allCells.forEach(c=>c.onclick=null);}
function confirmReset(){if(confirm("确定重新开始？")){resetGame();sendData("diff",totalCells);}}
function resetGame(){
    poison1=-1;poison2=-1;eatenList=[];nowPlayer=1;gameStage="select";
    initGrid();updateUI();
}
window.onload=()=>{initGrid();updateUI();};
</script>
</body>
</html>
