<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiraPlay Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body { background:#0b0f1a; color:#fff; }
.card:hover { transform: scale(1.05); transition: .2s; }
.scroll::-webkit-scrollbar { display:none; }
</style>
</head>

<body class="p-4">

<h1 class="text-2xl mb-4">🎬 MiraPlay Pro</h1>

<!-- 源 -->
<div class="flex gap-2 mb-3">
<input id="source" class="flex-1 p-2 rounded text-black" placeholder="输入源链接">
<button onclick="loadSource()" class="bg-blue-500 px-4 rounded">加载</button>
</div>

<!-- 搜索 -->
<div class="flex gap-2 mb-4">
<input id="wd" class="flex-1 p-2 rounded text-black" placeholder="搜索影片">
<button onclick="search()" class="bg-green-500 px-4 rounded">搜索</button>
</div>

<!-- 推荐 -->
<div>
<h2 class="mb-2">🔥 推荐</h2>
<div id="hot" class="flex gap-3 overflow-x-auto scroll"></div>
</div>

<!-- 搜索结果 -->
<div class="mt-4">
<h2 class="mb-2">🔍 结果</h2>
<div id="list" class="grid grid-cols-2 md:grid-cols-5 gap-3"></div>
</div>

<!-- 播放 -->
<div class="mt-6">
<video id="video" controls class="w-full rounded"></video>
<div id="routes" class="mt-2 flex gap-2 flex-wrap"></div>
</div>

<script>
let sites=[], api=""
const jx = [
"https://jx.jsonplayer.com/player/?url=",
"https://jx.aidouer.net/?url="
]

async function loadSource(){
let url=document.getElementById("source").value
let res=await fetch(url)
let data=await res.json()
sites=data.sites||[]
api=sites[0]?.api
alert("加载成功："+sites.length+"个站")
}

async function search(){
let wd=document.getElementById("wd").value
let url=api.includes("?")?api+wd:api+"?ac=detail&wd="+wd
let res=await fetch(url)
let data=await res.json()
let list=data.list||[]
render(list)
renderHot(list)
}

function render(list){
let el=document.getElementById("list")
el.innerHTML=""
list.forEach(v=>{
let d=document.createElement("div")
d.className="card bg-gray-800 p-2 rounded cursor-pointer"
d.innerHTML=`
<img src="${v.vod_pic}" class="w-full h-40 object-cover rounded">
<div class="text-sm mt-1">${v.vod_name}</div>
`
d.onclick=()=>showDetail(v)
el.appendChild(d)
})
}

function renderHot(list){
let el=document.getElementById("hot")
el.innerHTML=""
list.slice(0,10).forEach(v=>{
let d=document.createElement("div")
d.className="w-32 flex-shrink-0 cursor-pointer"
d.innerHTML=`
<img src="${v.vod_pic}" class="h-40 w-full object-cover rounded">
<div class="text-xs">${v.vod_name}</div>
`
d.onclick=()=>showDetail(v)
el.appendChild(d)
})
}

function showDetail(v){
saveHistory(v)
let routes=parseRoutes(v.vod_play_url)
renderRoutes(routes)
play(routes[0].url)
}

function parseRoutes(str){
return str.split("#").map(i=>{
let [name,url]=i.split("$")
return {name,url}
})
}

function renderRoutes(routes){
let el=document.getElementById("routes")
el.innerHTML=""
routes.forEach(r=>{
let b=document.createElement("button")
b.className="bg-gray-700 px-3 py-1 rounded"
b.innerText=r.name
b.onclick=()=>play(r.url)
el.appendChild(b)
})
}

function play(url){
let video=document.getElementById("video")

if(!url.includes(".m3u8")){
url=jx[0]+url
video.src=url
video.play()
return
}

if(Hls.isSupported()){
let hls=new Hls()
hls.loadSource(url)
hls.attachMedia(video)
}else{
video.src=url
}
video.play()
}

function saveHistory(v){
let h=JSON.parse(localStorage.getItem("his")||"[]")
h.unshift(v)
localStorage.setItem("his",JSON.stringify(h))
}
</script>

</body>
</html>
