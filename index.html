<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女巫的毒药</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .game-box {
            text-align: center;
        }
        h1 {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 26px;
        }
        .rule-tip {
            color: #aaa;
            margin-bottom: 15px;
            font-size: 14px;
        }
        /* 难度选择按钮 */
        .diff-buttons {
            margin-bottom: 20px;
        }
        .diff-btn {
            padding: 8px 16px;
            margin: 0 5px;
            border: none;
            border-radius: 6px;
            background: #0f3460;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        .diff-btn:hover {
            background: #16539e;
        }
        .turn-text {
            font-size: 20px;
            margin: 15px 0;
            color: #ffd700;
            height: 30px;
        }
        /* 棋盘通用样式 */
        .grid {
            display: grid;
            gap: 8px;
            margin: 0 auto 20px;
        }
        /* 不同宫格尺寸 */
        .grid-9 {
            grid-template-columns: repeat(3, 90px);
            grid-template-rows: repeat(3, 90px);
        }
        .grid-16 {
            grid-template-columns: repeat(4, 70px);
            grid-template-rows: repeat(4, 70px);
        }
        .grid-25 {
            grid-template-columns: repeat(5, 60px);
            grid-template-rows: repeat(5, 60px);
        }
        .cell {
            background: #4a6cf7;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .cell:hover {
            background: #6b8aff;
        }
        .cell.eaten {
            background: #333;
            opacity: 0.5;
            cursor: not-allowed;
        }
        /* 仅游戏结束显示毒药 */
        .cell.p1-poison {
            background: #c92a2a !important;
        }
        .cell.p2-poison {
            background: #2b8a3e !important;
        }
        #restart-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            background: #0f3460;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
        #restart-btn:hover {
            background: #16539e;
        }
    </style>
</head>
<body>
    <div class="game-box">
        <h1>女巫的毒药</h1>
        <div class="rule-tip">双人暗选毒药 | 轮流吃格 | 吃到对方毒药直接输</div>

        <!-- 新增：宫格难度选择 -->
        <div class="diff-buttons">
            <button class="diff-btn" onclick="setDiff(9)">9宫格</button>
            <button class="diff-btn" onclick="setDiff(16)">16宫格</button>
            <button class="diff-btn" onclick="setDiff(25)">25宫格</button>
        </div>

        <div class="turn-text" id="turnTip">请先选择宫格大小开始游戏</div>
        <div class="grid" id="gridBox"></div>
        <button id="restart-btn" onclick="resetGame()">重新开始</button>
    </div>

    <script>
        // 全局游戏配置
        let totalCells = 9; // 默认9宫格
        let poison1 = -1;
        let poison2 = -1;
        let eatenList = [];
        let nowPlayer = 1;
        let gameStage = "select"; // select选择难度 / pick1 / pick2 / battle / end
        let allCells = [];

        // 设置宫格难度
        function setDiff(num) {
            totalCells = num;
            resetGame();
            gameStage = "pick1";
            updateUI();
        }

        // 初始化棋盘
        function initGrid() {
            const box = document.getElementById("gridBox");
            box.innerHTML = "";
            allCells = [];

            // 根据宫格数设置样式
            box.className = "grid";
            if (totalCells === 9) box.classList.add("grid-9");
            if (totalCells === 16) box.classList.add("grid-16");
            if (totalCells === 25) box.classList.add("grid-25");

            // 生成格子
            for (let i = 0; i < totalCells; i++) {
                const cell = document.createElement("div");
                cell.className = "cell";
                cell.dataset.num = i;
                cell.onclick = () => clickCell(i);
                box.appendChild(cell);
                allCells.push(cell);
            }
        }

        // 点击格子逻辑
        function clickCell(num) {
            if (eatenList.includes(num) || gameStage === "end" || gameStage === "select") return;

            // 玩家1选毒
            if (gameStage === "pick1") {
                poison1 = num;
                gameStage = "pick2";
                updateUI();
                return;
            }

            // 玩家2选毒
            if (gameStage === "pick2") {
                if (num === poison1) {
                    alert("不能和对方选同一个毒药！");
                    return;
                }
                poison2 = num;
                gameStage = "battle";
                updateUI();
                return;
            }

            // 对战阶段
            eatenList.push(num);

            // 胜负判定
            if (nowPlayer === 1 && num === poison2) {
                gameStage = "end";
                document.getElementById("turnTip").innerText = "玩家1中招！玩家2获胜！";
                showAllPoison();
                lockAllCell();
                return;
            }
            if (nowPlayer === 2 && num === poison1) {
                gameStage = "end";
                document.getElementById("turnTip").innerText = "玩家2中招！玩家1获胜！";
                showAllPoison();
                lockAllCell();
                return;
            }

            // 切换玩家
            nowPlayer = nowPlayer === 1 ? 2 : 1;
            updateUI();
        }

        // 更新界面
        function updateUI() {
            if (gameStage === "select") {
                document.getElementById("turnTip").innerText = "请先选择宫格大小开始游戏";
            } else if (gameStage === "pick1") {
                document.getElementById("turnTip").innerText = "玩家1：悄悄选择你的毒药";
            } else if (gameStage === "pick2") {
                document.getElementById("turnTip").innerText = "玩家2：悄悄选择你的毒药";
            } else {
                document.getElementById("turnTip").innerText = `玩家${nowPlayer} 回合，请点击格子`;
            }

            // 刷新格子状态
            allCells.forEach((cell, index) => {
                cell.classList.remove("eaten", "p1-poison", "p2-poison");
                if (eatenList.includes(index)) cell.classList.add("eaten");
            });
        }

        // 游戏结束显示毒药
        function showAllPoison() {
            allCells.forEach((cell, index) => {
                if (index === poison1) cell.classList.add("p1-poison");
                if (index === poison2) cell.classList.add("p2-poison");
            });
        }

        // 锁定所有格子
        function lockAllCell() {
            allCells.forEach(cell => cell.onclick = null);
        }

        // 重置游戏
        function resetGame() {
            poison1 = -1;
            poison2 = -1;
            eatenList = [];
            nowPlayer = 1;
            gameStage = "select";
            initGrid();
            updateUI();
        }

        // 页面加载
        window.onload = () => {
            initGrid();
            updateUI();
        };
    </script>
</body>
</html>
