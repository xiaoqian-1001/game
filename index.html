<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>女巫的毒药 | 九宫格双人版</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:微软雅黑;
        }
        /* 核心居中：body全屏弹性布局 */
        body{
            background:#1a1a2e;
            color:#eee;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }
        .game{
            background:#252542;
            padding:30px;
            border-radius:12px;
            text-align:center;
        }
        h1{
            color:#e94560;
            margin-bottom:12px;
            font-size:24px;
        }
        .tip{
            color:#aaa;
            margin-bottom:18px;
            font-size:14px;
        }
        .phase{
            font-size:18px;
            margin:12px 0;
            color:#ffd700;
        }
        /* 九宫格本身居中 */
        .board{
            display:grid;
            grid-template-columns:repeat(3,80px);
            grid-template-rows:repeat(3,80px);
            gap:8px;
            margin:20px auto;
        }
        .cell{
            background:#4a6cf7;
            border-radius:8px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:22px;
            cursor:pointer;
            transition:.2s;
        }
        .cell:hover{background:#6b8aff}
        .cell.eaten{
            background:#333;
            opacity:.5;
            cursor:not-allowed;
        }
        .cell.p1{background:#c92a2a} /* 玩家1毒药红 */
        .cell.p2{background:#2b8a3e} /* 玩家2毒药绿 */
        button{
            padding:8px 20px;
            border:none;
            border-radius:6px;
            background:#0f3460;
            color:#fff;
            cursor:pointer;
            margin-top:10px;
            font-size:14px;
        }
        button:hover{background:#16539e}
    </style>
</head>
<body>
<div class="game">
    <h1>🧙‍♀️ 女巫的毒药（九宫格）</h1>
    <div class="tip">双人同屏 | 各选一颗毒药 | 吃到对方毒药直接输</div>
    <div class="phase" id="phase">玩家1：请选择你的毒药（点格子）</div>

    <div class="board" id="board"></div>

    <button onclick="restart()">重新开始</button>
</div>

<script>
let cells = [];
let poison1 = -1;
let poison2 = -1;
let eaten = [];
let turn = 1;
let step = "choose1"; // choose1选毒1 / choose2选毒2 / play对战

// 初始化九宫格
function init(){
    const board = document.getElementById('board');
    board.innerHTML = '';
    cells = [];

    for(let i=0;i<9;i++){
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.index = i;
        cell.onclick = () => click(i);
        board.appendChild(cell);
        cells.push(cell);
    }
    update();
}

// 点击格子逻辑
function click(idx){
    if(eaten.includes(idx)) return;

    // 阶段1：玩家1选毒药
    if(step === "choose1"){
        poison1 = idx;
        step = "choose2";
        update();
        return;
    }

    // 阶段2：玩家2选毒药（不能重复）
    if(step === "choose2"){
        if(idx === poison1){
            alert("不能选和玩家1一样的位置！");
            return;
        }
        poison2 = idx;
        step = "play";
        update();
        return;
    }

    // 阶段3：对战回合
    eaten.push(idx);

    // 判定胜负：吃到对方毒药直接输
    if(turn === 1 && idx === poison2){
        document.getElementById("phase").innerText = "💀 玩家1吃到毒药！玩家2获胜！";
        lockAll();
        return;
    }
    if(turn === 2 && idx === poison1){
        document.getElementById("phase").innerText = "💀 玩家2吃到毒药！玩家1获胜！";
        lockAll();
        return;
    }

    // 切换玩家
    turn = turn === 1 ? 2 : 1;
    update();
}

// 更新界面显示
function update(){
    // 文字提示
    if(step === "choose1"){
        document.getElementById("phase").innerText = "玩家1：请选择你的毒药（点一个格子）";
    }else if(step === "choose2"){
        document.getElementById("phase").innerText = "玩家2：请选择你的毒药（不能和1重复）";
    }else{
        document.getElementById("phase").innerText = `当前回合：玩家${turn}`;
    }

    // 格子样式刷新
    cells.forEach((cell,i)=>{
        cell.classList.remove("eaten","p1","p2");
        if(eaten.includes(i)) cell.classList.add("eaten");
        if(i === poison1) cell.classList.add("p1");
        if(i === poison2) cell.classList.add("p2");
    });
}

// 锁定所有格子，游戏结束
function lockAll(){
    cells.forEach(cell=> cell.onclick = null);
}

// 重新开始游戏
function restart(){
    poison1 = -1;
    poison2 = -1;
    eaten = [];
    turn = 1;
    step = "choose1";
    init();
}

// 页面加载自动启动
window.onload = init;
</script>
</body>
</html>
