<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maomao Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Maomao</h1>
        <div class="resource">
            <div>毛毛点数：<span id="points">0</span></div>
            <div>每秒获得：<span id="perSec">0</span>/s</div>
        </div>

        <button id="clickBtn" class="click-btn">点击获得点数</button>

        <div class="upgrades">
            <h3>升级</h3>
            <div class="upgrade-item">
                <button id="up1">提升点击收益</button>
                <span>花费：<span id="up1Cost">10</span></span>
            </div>
            <div class="upgrade-item">
                <button id="up2">被动产出</button>
                <span>花费：<span id="up2Cost">50</span></span>
            </div>
        </div>

        <div class="save-box">
            <button id="saveBtn">手动存档</button>
            <button id="resetBtn">重置全部进度</button>
            <div id="saveTip"></div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
