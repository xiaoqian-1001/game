<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女巫的毒药</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        /* ========== 修复1：页面强制完美居中 ========== */
        html, body {
            width: 100%;
            height: 100%;
            background: #121224;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 0;
        }
        .game-wrap {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }
        h1 {
            color: #c92a2a;
            margin-bottom: 8px;
            font-size: 28px;
            letter-spacing: 2px;
        }
        .rule-desc {
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
        }
        /* 联机面板样式 */
        .online-panel {
            margin-bottom: 15px;
            padding: 12px;
            background: #1e1e38;
            border-radius: 10px;
        }
        .online-panel input {
            padding: 8px;
            width: 140px;
            margin: 0 5px;
            border: none;
            border-radius: 6px;
            background: #272750;
            color: #fff;
            font-size: 16px;
        }
        .online-btn {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            background: #c92a2a;
            color: #fff;
            cursor: pointer;
            margin: 0 3px;
            font-size: 15px;
        }
        .online-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .online-status {
            margin-top: 10px;
            font-size: 15px;
            color: #888;
        }
        /* 宫格选择按钮 */
        .diff-buttons {
            margin-bottom: 20px;
        }
        .diff-btn {
            padding: 10px 20px;
            margin: 0 6px;
            border: none;
            border-radius: 8px;
            background: #272750;
            color: #fff;
            cursor: pointer;
            border: 2px solid #3a3a70;
            font-size: 16px;
        }
        .diff-btn:hover {
            background: #3a3a70;
        }
        /* ========== 修复2：回合提示文字颜色清晰可见 ========== */
        .turn-hint {
            font-size: 22px;
            margin: 15px 0;
            padding: 10px 24px;
            border-radius: 8px;
            display: inline-block;
            transition: 0.3s;
            font-weight: bold;
        }
        .turn-p1 {
            background: #3c1a1a;
            color: #ff8787;
            border: 2px solid #c92a2a;
        }
        .turn-p2 {
            background: #1a3c2a;
            color: #87ffb8;
            border: 2px solid #2b8a3e;
        }
        .turn-end {
            background: #3c3c1a;
            color: #ffd700;
            border: 2px solid #ffd700;
        }
        .turn-default {
            background: #272750;
            color: #ffffff;
            border: 2px solid #3a3a70;
        }
        /* 棋盘通用样式 */
        .grid-board {
            display: grid;
            gap: 12px;
            margin: 0 auto 30px;
        }
        /* 不同宫格尺寸 */
        .grid-9 {
            grid-template-columns: repeat(3, 90px);
            grid-template-rows: repeat(3, 90px);
        }
        .grid-16 {
            grid-template-columns: repeat(4, 75px);
            grid-template-rows: repeat(4, 75px);
        }
        .grid-25 {
            grid-template-columns: repeat(5, 65px);
            grid-template-rows: repeat(5, 65px);
        }
        @media (max-width: 450px) {
            .grid-board {
                gap: 8px;
            }
            .grid-9 {
                grid-template-columns: repeat(3, 70px);
                grid-template-rows: repeat(3, 70px);
            }
            .grid-16 {
                grid-template-columns: repeat(4, 60px);
                grid-template-rows: repeat(4, 60px);
            }
            .grid-25 {
                grid-template-columns: repeat(5, 50px);
                grid-template-rows: repeat(5, 50px);
            }
        }
        .cell {
            background: #272750;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid #3a3a70;
        }
        .cell:hover:not(.eaten) {
            background: #3a3a70;
            transform: scale(1.05);
        }
        .cell:active:not(.eaten) {
            transform: scale(0.95);
        }
        /* 已吃掉格子：纯黑完全不可用 */
        .cell.eaten {
            background: #000;
            border-color: #111;
            cursor: not-allowed;
            transform: none;
        }
        /* 游戏结束才显示毒药 */
        .cell.p1-poison {
            background: #c92a2a !important;
            border-color: #ff8787 !important;
            animation: poisonBlink 0.8s infinite alternate;
        }
        .cell.p2-poison {
            background: #2b8a3e !important;
            border-color: #87ffb8 !important;
            animation: poisonBlink 0.8s infinite alternate;
        }
        @keyframes poisonBlink {
            from { opacity: 0.8; }
            to { opacity: 1; }
        }
        /* 遮罩防偷看 */
        .mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            color: #fff;
            font-size: 24px;
            text-align: center;
            padding: 20px;
        }
        /* 按钮 */
        #restart-btn {
            padding: 12px 35px;
            border: none;
            border-radius: 10px;
            background: #272750;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid #3a3a70;
        }
        #restart-btn:hover {
            background: #3a3a70;
        }
    </style>
    <!-- 引入P2P联机库 -->
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="game-wrap">
        <h1>女巫的毒药</h1>
        <div class="rule-desc">双人暗选毒药 · 轮流吃格 · 吃到对方毒药即败</div>

        <!-- 联机面板 -->
        <div class="online-panel">
            <input type="text" id="roomId" placeholder="输入房间号">
            <button class="online-btn" onclick="createRoom()">创建房间</button>
            <button class="online-btn" onclick="joinRoom()">加入房间</button>
            <button class="online-btn" onclick="disconnectRoom()">断开</button>
            <div class="online-status" id="onlineStatus">未连接</div>
        </div>

        <!-- 宫格选择 -->
        <div class="diff-buttons">
            <button class="diff-btn" onclick="setDiff(9)">9宫格</button>
            <button class="diff-btn" onclick="setDiff(16)">16宫格</button>
            <button class="diff-btn" onclick="setDiff(25)">25宫格</button>
        </div>
        
        <div class="turn-hint turn-default" id="turnHint">请先选择宫格或联机</div>
        <div class="grid-board" id="gridBox"></div>
        <button id="restart-btn" onclick="confirmReset()">重新开始</button>
    </div>

    <!-- 防偷看遮罩 -->
    <div class="mask" id="mask" style="display: none;"></div>

    <script>
        // ========== 联机核心 ==========
        let peer, conn;
        let isHost = false;
        let isOnline = false;

        // ========== 修复3：严格区分玩家身份 ==========
        // 房主 = 玩家1  访客 = 玩家2  身份永久固定，不会切换
        let myPlayer = 0; // 0未连接 / 1房主 / 2访客

        // ========== 游戏核心 ==========
        let totalCells = 9;
        let poison1 = -1; // 玩家1毒药（房主）
        let poison2 = -1; // 玩家2毒药（访客）
        let eatenList = [];
        let nowPlayer = 1; // 当前回合玩家
        let gameStage = "select"; // select/pick1/pick2/battle/end
        let allCells = [];

        // ========== 联机函数 ==========
        function createRoom() {
            const roomId = document.getElementById("roomId").value || Math.random().toString(36).slice(2,8);
            peer = new Peer(roomId);
            isHost = true;
            myPlayer = 1; // 创建房间的人固定为玩家1

            peer.on('open', () => {
                document.getElementById("onlineStatus").innerText = `✅ 房间：${roomId}，等待对手加入`;
            });

            peer.on('connection', (c) => {
                conn = c;
                isOnline = true;
                document.getElementById("onlineStatus").innerText = "✅ 对手已加入，你是【玩家1】";
                bindConn();
            });
        }

        function joinRoom() {
            const roomId = document.getElementById("roomId").value;
            if (!roomId) return alert("请输入房间号");

            peer = new Peer();
            isHost = false;
            myPlayer = 2; // 加入房间的人固定为玩家2

            peer.on('open', () => {
                conn = peer.connect(roomId);
                document.getElementById("onlineStatus").innerText = "正在连接房间...";

                conn.on('open', () => {
                    isOnline = true;
                    document.getElementById("onlineStatus").innerText = "✅ 加入成功，你是【玩家2】";
                    bindConn();
                });
            });
        }

        function disconnectRoom() {
            if (conn) conn.close();
            if (peer) peer.destroy();
            isOnline = false;
            myPlayer = 0;
            document.getElementById("onlineStatus").innerText = "已断开连接";
        }

        function bindConn() {
            conn.on('data', (data) => {
                switch(data.type) {
                    case "diff":
                        totalCells = data.val;
                        resetGame();
                        break;
                    case "pick1":
                        poison1 = data.val;
                        gameStage = "pick2";
                        updateUI();
                        // 只有玩家2才会收到这个提示
                        if(myPlayer === 2){
                            showMask("✅ 玩家1已选毒\n请你悄悄选择你的毒药");
                            setTimeout(()=>{hideMask();},2000);
                        }
                        break;
                    case "pick2":
                        poison2 = data.val;
                        gameStage = "battle";
                        updateUI();
                        showMask("✅ 双方选毒完成！\n开始对战，千万别吃到对方毒药！");
                        setTimeout(()=>{hideMask();},2000);
                        break;
                    case "eat":
                        eatenList = data.eaten;
                        nowPlayer = data.player;
                        gameStage = data.stage;
                        updateUI();
                        if (data.stage === "end") {
                            document.getElementById("turnHint").innerText = data.msg;
                            document.getElementById("turnHint").className = "turn-hint turn-end";
                            showAllPoison();
                            lockAllCell();
                        }
                        break;
                }
            });

            conn.on('close', () => {
                isOnline = false;
                myPlayer = 0;
                document.getElementById("onlineStatus").innerText = "❌ 对手断开连接";
            });
        }

        function sendData(type, val) {
            if (!isOnline || !conn) return;
            conn.send({
                type, val,
                eaten: eatenList,
                player: nowPlayer,
                stage: gameStage,
                msg: document.getElementById("turnHint").innerText
            });
        }

        // ========== 宫格切换 ==========
        function setDiff(num) {
            totalCells = num;
            resetGame();
            gameStage = "pick1";
            updateUI();
            sendData("diff", num);
        }

        // ========== 棋盘初始化 ==========
        function initGrid() {
            const box = document.getElementById("gridBox");
            box.innerHTML = "";
            allCells = [];

            box.className = "grid-board";
            if (totalCells === 9) box.classList.add("grid-9");
            if (totalCells === 16) box.classList.add("grid-16");
            if (totalCells === 25) box.classList.add("grid-25");

            for (let i = 0; i < totalCells; i++) {
                const cell = document.createElement("div");
                cell.className = "cell";
                cell.dataset.id = i;
                cell.onclick = () => clickCell(i);
                box.appendChild(cell);
                allCells.push(cell);
            }
        }

        // ========== 防偷看遮罩 ==========
        function showMask(text) {
            const mask = document.getElementById("mask");
            mask.innerText = text;
            mask.style.display = "flex";
        }
        function hideMask() {
            document.getElementById("mask").style.display = "none";
        }

        // ========== 点击逻辑 ==========
        function clickCell(id) {
            if (eatenList.includes(id) || gameStage === "end") return;

            // ========== 修复3：严格限制操作权限 ==========
            // 1. 选毒阶段：只能自己选自己的毒药，别人不能操作
            // 2. 对战阶段：只能自己回合才能操作
            if (isOnline) {
                // 选毒1阶段：只有房主（玩家1）能操作
                if(gameStage === "pick1" && myPlayer !== 1){
                    alert("请等待玩家1选择毒药");
                    return;
                }
                // 选毒2阶段：只有访客（玩家2）能操作
                if(gameStage === "pick2" && myPlayer !== 2){
                    alert("请等待玩家2选择毒药");
                    return;
                }
                // 对战阶段：只有当前回合玩家能操作
                if(gameStage === "battle" && myPlayer !== nowPlayer){
                    alert("现在不是你的回合！");
                    return;
                }
            }

            // 阶段1：玩家1（房主）选毒
            if (gameStage === "pick1") {
                poison1 = id;
                gameStage = "pick2";
                updateUI();
                sendData("pick1", id);
                // 房主自己的遮罩
                showMask("✅ 你已选毒完成！\n请等待玩家2选择");
                setTimeout(()=>{hideMask();},2000);
                return;
            }

            // 阶段2：玩家2（访客）选毒
            if (gameStage === "pick2") {
                if (id === poison1) {
                    alert("⚠️ 不能和玩家1选择同一个毒药！");
                    return;
                }
                poison2 = id;
                gameStage = "battle";
                updateUI();
                sendData("pick2", id);
                return;
            }

            // 不能吃自己的毒药
            if ((myPlayer === 1 && id === poison1) || (myPlayer === 2 && id === poison2)) {
                alert("⚠️ 不能选择自己的毒药！");
                return;
            }

            // 对战吃格
            eatenList.push(id);

            // 胜负判定
            if (nowPlayer === 1 && id === poison2) {
                gameStage = "end";
                document.getElementById("turnHint").innerText = "💀 玩家1中招！玩家2获胜！";
                document.getElementById("turnHint").className = "turn-hint turn-end";
                showAllPoison();
                lockAllCell();
                sendData("eat");
                return;
            }
            if (nowPlayer === 2 && id === poison1) {
                gameStage = "end";
                document.getElementById("turnHint").innerText = "💀 玩家2中招！玩家1获胜！";
                document.getElementById("turnHint").className = "turn-hint turn-end";
                showAllPoison();
                lockAllCell();
                sendData("eat");
                return;
            }

            // 切换回合
            nowPlayer = nowPlayer === 1 ? 2 : 1;
            updateUI();
            sendData("eat");
        }

        // ========== 界面更新 ==========
        function updateUI() {
            const hint = document.getElementById("turnHint");
            if (gameStage === "select") {
                hint.innerText = "请先选择宫格或联机";
                hint.className = "turn-hint turn-default";
            } else if (gameStage === "pick1") {
                hint.innerText = "玩家1：请悄悄选择你的毒药";
                hint.className = "turn-hint turn-p1";
            } else if (gameStage === "pick2") {
                hint.innerText = "玩家2：请悄悄选择你的毒药";
                hint.className = "turn-hint turn-p2";
            } else if (gameStage === "battle") {
                hint.innerText = `玩家${nowPlayer} 回合，请点击格子`;
                hint.className = nowPlayer === 1 ? "turn-hint turn-p1" : "turn-hint turn-p2";
            }

            allCells.forEach((cell, idx) => {
                cell.classList.remove("eaten", "p1-poison", "p2-poison");
                if (eatenList.includes(idx)) cell.classList.add("eaten");
            });
        }

        // ========== 显示毒药 ==========
        function showAllPoison() {
            allCells.forEach((cell, idx) => {
                if (idx === poison1) cell.classList.add("p1-poison");
                if (idx === poison2) cell.classList.add("p2-poison");
            });
        }

        // ========== 锁定格子 ==========
        function lockAllCell() {
            allCells.forEach(cell => cell.onclick = null);
        }

        // ========== 重置确认 ==========
        function confirmReset() {
            if (confirm("确定要重新开始游戏吗？本局进度将清空！")) {
                resetGame();
                sendData("diff", totalCells);
            }
        }

        // ========== 重置游戏 ==========
        function resetGame() {
            poison1 = -1;
            poison2 = -1;
            eatenList = [];
            nowPlayer = 1;
            gameStage = "select";
            initGrid();
            updateUI();
        }

        // ========== 页面启动 ==========
        window.onload = () => {
            initGrid();
            updateUI();
        };
    </script>
</body>
</html>
